name: Asset Monthly Metrics


on:
  # push:
  #   branches:
  #     - feat/asset-metrics-monthly-and-mailer #solo para testeo
  schedule:
    - cron: "0 6 1 * *"  # primer día del mes :p
  workflow_dispatch:      

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install requests psycopg2-binary pandas

      - name: Correr script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts_ghactions/assets_monthly_metrics.py