name: Backend Tests

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  test:
    name: Integration suite + métricas (Postgres efímero)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orion
          POSTGRES_PASSWORD: orion
          POSTGRES_DB: orion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orion"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: dev
      # asyncpg (FastAPI / repos)
      DATABASE_URL_DEV: postgresql+asyncpg://orion:orion@localhost:5432/orion_test
      # psycopg2 (asset_metrics_test + cron script)
      DATABASE_TESTING: postgresql://orion:orion@localhost:5432/orion_test
      # secret de prueba (no es válido en prod) — debe matchear el del integration_test
      CLERK_WEBHOOK_SECRET: whsec_dGVzdC1zZWNyZXQtdmFsdWUtMTIzNDU2Nzg5MA==
      CLERK_ISSUER: https://worthy-jackal-80.clerk.accounts.dev
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (errores de sintaxis críticos)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Aplicar migraciones Alembic
        run: alembic upgrade head

      - name: Levantar uvicorn en background
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo "UVICORN_PID=$!" >> $GITHUB_ENV

      - name: Esperar a que la API esté lista
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/ >/dev/null; then
              echo "API up tras ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "TIMEOUT esperando API"
          tail -80 /tmp/uvicorn.log
          exit 1

      - name: Fases 2-5 — integration_test (API contract, auth, webhook svix, data layer + isolation, ingestion)
        run: python -m scripts.integration_test --label=ci

      # Nota: asset_metrics_test depende de un UNIQUE (asset_id, date) en
      # asset_daily_metrics que existe en Neon pero falta en la migración
      # inicial de Alembic. Por eso pasa en test_local.sh / test_neon.sh
      # pero no en CI fresh. Cuando el cron script ON CONFLICT (asset_id, date)
      # se respalde con migración correspondiente, agregar:
      #   - run: pytest scripts/asset_metrics_test.py -v

      - name: Logs uvicorn (si falló algún test)
        if: failure()
        run: tail -200 /tmp/uvicorn.log

      - name: Detener uvicorn
        if: always()
        run: kill $UVICORN_PID 2>/dev/null || true
