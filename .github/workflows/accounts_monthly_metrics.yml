name: Account Monthly Metrics

on:
  # push:
  #   branches:
  #     - feat/asset-metrics-monthly-and-mailer #solo para testeo
  schedule:
    - cron: "0 7 1 * *"   # día 1 de cada mes 07:00 UTC, tras la reconstrucción
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install psycopg2-binary

      - name: Correr cómputo de métricas mensuales de cuenta
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts_ghactions/accounts_monthly_metrics.py --apply
